<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SDE-2 Android Interview Prep · Dashboard</title>
<style>
  :root {
    --bg: #0b0f17;
    --card: #121826;
    --card-hover: #1a2236;
    --border: #232b3d;
    --text: #e6edf7;
    --text-dim: #8a94a7;
    --accent: #6ea8fe;
    --accent-hover: #90bcff;
    --success: #3fb950;
    --warn: #f0b429;
    --muted: #4a5365;

    --phase1: #6ea8fe;
    --phase2: #bb86fc;
    --phase3: #ff9770;
    --phase4: #70d6ff;
    --phase5: #9ef07a;
    --phase6: #ffd166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(110,168,254,0.08), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(187,134,252,0.07), transparent 60%),
      var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 48px 16px 80px;
    min-height: 100vh;
  }
  .container { max-width: 1080px; margin: 0 auto; }

  header {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }
  header .eyebrow {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    margin-bottom: 14px;
  }
  header h1 {
    font-size: 34px;
    font-weight: 800;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--phase1), var(--phase2), var(--phase3), var(--phase4));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { color: var(--text-dim); font-size: 15px; max-width: 640px; margin: 0 auto; }

  .meta-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 999px;
  }
  .chip strong { color: var(--text); font-weight: 600; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
    margin-top: 8px;
  }

  .card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 22px 20px;
    text-decoration: none;
    color: inherit;
    transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 180px;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 4px;
    background: var(--card-accent, var(--accent));
  }
  .card:hover {
    background: var(--card-hover);
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-2px);
  }
  .card.disabled {
    cursor: not-allowed;
    opacity: 0.6;
  }
  .card.disabled:hover {
    background: var(--card);
    border-color: var(--border);
    transform: none;
  }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .phase-tag {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--card-accent, var(--accent));
    font-weight: 700;
  }
  .status {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: rgba(255,255,255,0.02);
  }
  .status.ready { color: var(--success); border-color: rgba(63,185,80,0.35); }
  .status.soon { color: var(--warn); border-color: rgba(240,180,41,0.35); }

  .card h2 {
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }
  .card p {
    font-size: 13.5px;
    color: var(--text-dim);
    flex-grow: 1;
  }
  .card-foot {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--text-dim);
  }
  .card-foot .arrow {
    color: var(--card-accent, var(--accent));
    font-weight: 700;
    transition: transform 120ms ease;
  }
  .card:hover .card-foot .arrow { transform: translateX(4px); }

  footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
  }

  @media (max-width: 520px) {
    header h1 { font-size: 26px; }
    body { padding: 28px 14px 60px; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <span class="eyebrow">Dashboard</span>
      <h1>SDE-2 Android Interview Prep</h1>
      <p>A phased study plan. Pick a phase to open its deep-dive page.</p>
      <div class="meta-row">
        <span class="chip"><strong id="readyCount">0</strong> phases ready</span>
        <span class="chip"><strong id="totalCount">0</strong> total</span>
        <span class="chip">by <strong>Bhupendra</strong></span>
      </div>
    </header>

    <main>
      <div class="grid" id="phaseGrid"></div>
    </main>

    <footer>
      To add a new phase, append an entry to the <code>PHASES</code> array below.
    </footer>
  </div>

<script>
  // ------------------------------------------------------------
  // PHASES — add Phase 5, 6, ... by appending to this array.
  // status: "ready" (clickable) | "soon" (disabled placeholder)
  // color:  any CSS color — drives the accent stripe & tag hue.
  // ------------------------------------------------------------
  const PHASES = [
    {
      id: 1,
      title: "Phase 1 · Foundations",
      subtitle: "Kotlin, coroutines, core Android fundamentals.",
      href: "interview_prep.html#phase-1",
      file: "interview_prep.html",
      color: "#6ea8fe",
      status: "ready",
    },
    {
      id: 2,
      title: "Phase 2 · Architecture",
      subtitle: "MVVM, Clean Architecture, DI with Hilt, testing.",
      href: "interview_prep.html#phase-2",
      file: "interview_prep.html",
      color: "#bb86fc",
      status: "ready",
    },
    {
      id: 3,
      title: "Phase 3 · Advanced Android",
      subtitle: "Jetpack, Compose, performance, background work.",
      href: "interview_prep_p3_p4.html#phase-3",
      file: "interview_prep_p3_p4.html",
      color: "#ff9770",
      status: "ready",
    },
    {
      id: 4,
      title: "Phase 4 · System Design",
      subtitle: "App-level & mobile system design, scaling, tradeoffs.",
      href: "interview_prep_p3_p4.html#phase-4",
      file: "interview_prep_p3_p4.html",
      color: "#70d6ff",
      status: "ready",
    },
    {
      id: 5,
      title: "Phase 5 · DSA",
      subtitle: "Patterns that show up at FAANG + unicorns. HashMap, sliding window, DP, graphs, heaps.",
      href: "interview_prep_p5_p6.html#phase-5",
      file: "interview_prep_p5_p6.html",
      color: "#9ef07a",
      status: "ready",
    },
    {
      id: 6,
      title: "Phase 6 · System Design & LLD",
      subtitle: "Mobile system design, offline-first, modularization, design patterns, LLD.",
      href: "interview_prep_p5_p6.html#phase-6",
      file: "interview_prep_p5_p6.html",
      color: "#ffd166",
      status: "ready",
    },
    {
      id: 7,
      title: "Phase 7 · Modern Android 2026",
      subtitle: "KMP, Compose Multiplatform, Baseline Profiles, Play Integrity, Credential Manager, on-device AI.",
      href: "interview_prep_p7_p8.html#phase-7",
      file: "interview_prep_p7_p8.html",
      color: "#f78da7",
      status: "ready",
    },
    {
      id: 8,
      title: "Phase 8 · Behavioral & Leadership",
      subtitle: "STAR stories, disagreements, ownership, mentorship — the round most engineers under-prep.",
      href: "interview_prep_p7_p8.html#phase-8",
      file: "interview_prep_p7_p8.html",
      color: "#a78bfa",
      status: "ready",
    },
    {
      id: 9,
      title: "Phase 9 · System Design (Advanced)",
      subtitle: "Netflix, Reels, Swiggy, Maps, Twitter, Notion, Push. End-to-end walkthroughs, speak-out-loud.",
      href: "interview_prep_p9_p10.html#phase-9",
      file: "interview_prep_p9_p10.html",
      color: "#38d9a9",
      status: "ready",
    },
    {
      id: 10,
      title: "Phase 10 · LLD Classics",
      subtitle: "Elevator, Splitwise, BookMyShow, Logger, Snake & Ladder, Vending Machine, File System.",
      href: "interview_prep_p9_p10.html#phase-10",
      file: "interview_prep_p9_p10.html",
      color: "#ff6b6b",
      status: "ready",
    },
  ];

  function render() {
    const grid = document.getElementById("phaseGrid");
    grid.innerHTML = "";

    PHASES.forEach((p) => {
      const isReady = p.status === "ready";
      const el = document.createElement(isReady ? "a" : "div");
      el.className = "card" + (isReady ? "" : " disabled");
      if (isReady) el.href = p.href;
      el.style.setProperty("--card-accent", p.color);

      el.innerHTML = `
        <div class="card-head">
          <span class="phase-tag">Phase ${p.id}</span>
          <span class="status ${isReady ? "ready" : "soon"}">
            ${isReady ? "Ready" : "Coming soon"}
          </span>
        </div>
        <h2>${p.title}</h2>
        <p>${p.subtitle}</p>
        <div class="card-foot">
          <span>${p.file ? p.file : "—"}</span>
          <span class="arrow">${isReady ? "Open →" : "•"}</span>
        </div>
      `;
      grid.appendChild(el);
    });

    document.getElementById("readyCount").textContent =
      PHASES.filter((p) => p.status === "ready").length;
    document.getElementById("totalCount").textContent = PHASES.length;
  }

  render();
</script>
</body>
</html>
